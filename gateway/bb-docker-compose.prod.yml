services:
  backend:
    build:
      context: ../backend
      target: production
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  app-data:
