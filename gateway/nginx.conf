# ══════════════════════════════════════════════════════════════
# Gateway Reverse Proxy — standalone, no app rebuilds touch this
# ══════════════════════════════════════════════════════════════
# After GCP LB rewrites:
#   /scanner/sc1/*            → /*
#   /scanner/live-detection/* → /live-detection/*
# ══════════════════════════════════════════════════════════════

client_max_body_size 2G;

server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── BundleBox API ──
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Pipeline service ──
    location /pipeline/ {
        proxy_pass http://host.docker.internal:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Florence live detection (from GCP LB rewrite) ──
    location /live-detection/ {
        proxy_pass http://host.docker.internal:8200/live-detection/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── BundleBox SPA (default — catch-all) ──
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host $host;
    }
}
