<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <title>BundleBox</title>
  </head>
  <body>
    <!-- ══════════ HOME SCREEN ══════════ -->
    <div id="home" class="screen active">
      <div class="logo-wrap">
        <img src="/icon-192.png" alt="BundleBox" class="logo-icon" />
        <div class="logo">Bundle<span>Box</span></div>
      </div>
      <p class="tagline">Smart room inventory in minutes</p>

      <div class="status-card">
        <div class="status-row">
          <span class="label">Server</span>
          <span id="h-server-status"
            ><span class="status-dot loading"></span>Checking...</span
          >
        </div>
        <div class="status-row">
          <span class="label">Model</span>
          <span id="h-model-name">Florence-2-base</span>
        </div>
        <div class="status-row">
          <span class="label">Device</span>
          <span id="h-device">—</span>
        </div>
      </div>

      <button class="start-btn" id="h-start" disabled onclick="startScan()">
        START SCAN ▶
      </button>

      <div class="settings-card">
        <h3>⚙ Settings</h3>
        <div class="setting-row">
          <label>Task</label>
          <select id="h-task">
            <option value="<OD>">Object Detection</option>
            <option value="<DENSE_REGION_CAPTION>">Dense Caption</option>
          </select>
        </div>
        <div class="setting-row">
          <label>Draw Style</label>
          <select id="h-style">
            <option value="boxes">Bounding Boxes</option>
            <option value="filled">Filled Overlay</option>
          </select>
        </div>
        <div class="setting-row">
          <label>Max Duration</label>
          <select id="h-duration">
            <option value="30">30 seconds</option>
            <option value="60" selected>60 seconds</option>
            <option value="120">2 minutes</option>
            <option value="300">5 minutes</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ══════════ SCAN SCREEN ══════════ -->
    <div id="scan" class="screen">
      <div class="scan-header">
        <div class="rec-badge">
          <div class="rec-dot"></div>
          <span id="s-timer">0:00</span>
        </div>
        <div class="item-count-badge" id="s-detecting">Detecting...</div>
      </div>

      <div class="scan-canvas-wrap">
        <video id="s-video" playsinline muted autoplay></video>
        <canvas id="s-canvas"></canvas>
      </div>

      <div class="ticker" id="s-ticker"></div>

      <div class="scan-footer">
        <button class="scan-btn pause-btn" id="s-pause" onclick="togglePause()">
          ⏸ Pause
        </button>
        <button class="scan-btn done-btn" onclick="finishScan()">✓ Done</button>
      </div>
    </div>

    <!-- ══════════ RESULTS SCREEN ══════════ -->
    <div id="results" class="screen">
      <div class="results-header">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <h2>Scan Results</h2>
        <div style="width: 48px"></div>
      </div>

      <div class="results-meta" id="r-meta"></div>

      <div class="processing-banner" id="r-processing">
        <div class="spinner"></div>
        <div style="font-size: 14px; font-weight: 600">
          Analyzing with Gemini 2.0 Flash...
        </div>
        <div style="font-size: 12px; color: #888; margin-top: 4px">
          Building accurate inventory from captured frames
        </div>
      </div>

      <div class="inventory-final" id="r-inventory" style="display: none"></div>
      <div class="inventory-total" id="r-total" style="display: none"></div>

      <div class="results-stats" id="r-stats"></div>

      <div class="results-actions">
        <button class="action-btn primary" onclick="goHome()">
          SCAN AGAIN 🔄
        </button>
        <button class="action-btn secondary" onclick="shareResults()">
          SHARE RESULTS 📤
        </button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
